<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hello my Lover 😚❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display",sans-serif;
}

body{

background:linear-gradient(180deg,#ffdce8,#ffeef5);

display:flex;

justify-content:center;

align-items:center;

height:100vh;

overflow:hidden;

}

.card{

width:90%;

max-width:420px;

background:rgba(255,255,255,.35);

backdrop-filter:blur(18px);

padding:35px;

border-radius:35px;

text-align:center;

box-shadow:0 10px 35px rgba(0,0,0,.12);

animation:fade .8s ease;

}

h1{

font-size:38px;

color:#d84d8c;

margin-bottom:18px;

}

p{

font-size:18px;

line-height:1.7;

color:#555;

margin-bottom:25px;

}

button{

background:#ef6fa7;

color:white;

border:none;

padding:15px 35px;

border-radius:100px;

font-size:18px;

cursor:pointer;

transition:.25s;

}

button:hover{

transform:scale(1.05);

}

#letter{

display:none;

margin-top:30px;

text-align:left;

font-size:18px;

line-height:1.9;

animation:fade .6s ease;

}

@keyframes fade{

from{

opacity:0;

transform:translateY(20px);

}

to{

opacity:1;

transform:none;

}

}

.heart{

position:absolute;

font-size:22px;

animation:float 10s linear infinite;

opacity:.5;

}

@keyframes float{

0%{

transform:translateY(110vh);

}

100%{

transform:translateY(-120vh);

}

}

</style>

</head>

<body>

<div class="heart" style="left:10%;animation-delay:0s;">🌸</div>
<div class="heart" style="left:30%;animation-delay:2s;">❤️</div>
<div class="heart" style="left:60%;animation-delay:5s;">🌸</div>
<div class="heart" style="left:85%;animation-delay:1s;">❤️</div>

<div class="card">

<h1>Hello my Lover 😚❤️</h1>

<p>
Hi Lovie 🌸<br><br>

I made this little place just for you.
Whenever you miss me...
come back here. ❤️
</p>

<button onclick="showLetter()">
💌 Open My Letter
</button>

<div id="letter">

YOUR LOVE LETTER GOES HERE ❤️

<br><br>

Love,

<br>

Franz ❤️

</div>

</div>

<script>

function showLetter(){

document.getElementById("letter").style.display="block";

}

</script>

</body>

</html>
